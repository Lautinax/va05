<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pedidos y Reposiciones - VA05</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h2 {
            color: #1e3a8a;
            margin-top: 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .drop-zone {
            border: 2px dashed #3b82f6;
            padding: 25px;
            text-align: center;
            background: #eff6ff;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #1d4ed8;
            font-weight: 500;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .drop-zone:hover { background: #dbeafe; }
        
        .panel-control {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Tabla de edición en la aplicación */
        .table-container {
            overflow-x: auto;
            max-height: 400px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f8fafc;
            color: #334155;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: inset 0 -1px 0 #cbd5e1;
        }
        tr:hover { background-color: #f1f5f9; }
        
        .input-cantidad {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .btn:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 11px;}
        .btn-danger:hover { background-color: #dc2626; }
        .btn-success { background-color: #10b981; font-size: 14px; padding: 10px 20px;}
        .btn-success:hover { background-color: #059669; }

        .particularidades-section {
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .particularidades-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
            font-size: 14px;
        }
        .particularidades-section textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            font-size: 13px;
        }

        /* Notificación flotante */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
            animation: fadeIn 0.3s, fadeOut 0.3s 2.7s;
            z-index: 1000;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="toast" id="toast">¡Copiado con éxito! Ya podés pegarlo en tu mail.</div>

<div class="container">
    <h2>Asistente de Envío a Back Office (Filtro VA05)</h2>
    
    <div id="dropZone" class="drop-zone">
        Arrastrá acá el reporte Excel de la VA05 o hacé clic para buscarlo.
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display:none">
    </div>

    <div id="workspace" style="display: none;">
        <div class="panel-control">
            <span style="font-size: 13px; color: #64748b;" id="infoFilas"></span>
            <span style="font-size: 12px; color: #b91c1c; font-weight: 500;">💡 Podés cambiar las cantidades directamente en la casilla.</span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Doc. Ventas</th>
                        <th>Ref. Cliente</th>
                        <th>Solicitante</th>
                        <th>Descripción Material</th>
                        <th style="text-align: center; width: 90px;">Cantidad</th>
                        <th style="text-align: center; width: 80px;">Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo">
                    </tbody>
            </table>
        </div>

        <div class="particularidades-section">
            <label for="txtParticularidades">📝 Particularidades / Notas para Back Office:</label>
            <textarea id="txtParticularidades" placeholder="Escribí acá aclaraciones sobre la entrega, transporte, urgencias, etc..."></textarea>
        </div>

        <div style="text-align: right;">
            <button class="btn btn-success" onclick="copiarContenidoMail()">📋 Copiar Estructura para el Mail</button>
        </div>
    </div>
</div>

<div id="htmlMailTemplate" style="display: none;"></div>

<script>
    let datosFiltrados = [];
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const workspace = document.getElementById('workspace');
    const tablaCuerpo = document.getElementById('tablaCuerpo');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#dbeafe'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '#eff6ff');
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = '#eff6ff';
        if (e.dataTransfer.files.length > 0) procesarExcel(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) procesarExcel(e.target.files[0]);
    });

    function procesarExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet);

            if(json.length === 0) {
                alert("El archivo seleccionado está vacío.");
                return;
            }

            // Mapeamos buscando los nombres exactos de columnas de la VA05 estándar
            datosFiltrados = json.map((fila, index) => {
                return {
                    idInterno: index,
                    docVentas: fila["Documento de ventas"] || "",
                    refCliente: fila["Referencia de cliente"] || "",
                    solicitante: fila["Nombre del solicitante"] || "",
                    material: fila["Descripción del material"] || "",
                    cantidad: parseInt(fila["Cantidad de pedido (Posición)"] || fila["Cantidad de pedido"]) || 1
                };
            }).filter(f => f.material !== ""); // Filtramos si hay filas vacías

            workspace.style.display = 'block';
            dropZone.innerText = `🟢 Archivo cargado: ${file.name}`;
            renderizarTabla();
        };
        reader.readAsArrayBuffer(file);
    }

    function renderizarTabla() {
        tablaCuerpo.innerHTML = '';
        document.getElementById('infoFilas').innerText = `Mostrando ${datosFiltrados.length} posiciones encontradas.`;

        datosFiltrados.forEach((fila, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${fila.docVentas}</td>
                <td>${fila.refCliente}</td>
                <td>${fila.solicitante}</td>
                <td><strong>${fila.material}</strong></td>
                <td style="text-align: center;">
                    <input type="number" class="input-cantidad" value="${fila.cantidad}" min="1" 
                           onchange="actualizarCantidad(${idx}, this.value)">
                </td>
                <td style="text-align: center;">
                    <button class="btn btn-danger" onclick="eliminarFila(${idx})">Eliminar</button>
                </td>
            `;
            tablaCuerpo.appendChild(tr);
        });
    }

    function actualizarCantidad(index, valor) {
        let cant = parseInt(valor);
        if(isNaN(cant) || cant < 1) cant = 1;
        datosFiltrados[index].cantidad = cant;
    }

    function eliminarFila(index) {
        datosFiltrados.splice(index, 1);
        renderizarTabla();
    }

    function copiarContenidoMail() {
        if(datosFiltrados.length === 0) {
            alert("No hay datos en la tabla para enviar.");
            return;
        }

        const particularidades = document.getElementById('txtParticularidades').value.trim();
        const infoGeneral = datosFiltrados[0]; // Para sacar datos del cliente generales

        // Construcción del HTML con estilos en línea (Crucial para que Outlook y Gmail mantengan el diseño)
        let htmlMail = `
            <div style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; padding: 10px; color: #333333; max-width: 800px;">
                <p style="font-size: 15px; margin-bottom: 15px;">Hola Back Office,</p>
                <p style="font-size: 14px; margin-bottom: 20px;">Solicito la siguiente reposición/carga en base al reporte adjunto:</p>
                
                <table style="width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; border: 1px solid #cbd5e1;">
                    <thead>
                        <tr style="background-color: #1e3a8a; color: #ffffff; text-align: left;">
                            <th style="padding: 10px; border: 1px solid #cbd5e1; font-weight: 600;">Doc. Ventas</th>
                            <th style="padding: 10px; border: 1px solid #cbd5e1; font-weight: 600;">Ref. Cliente</th>
                            <th style="padding: 10px; border: 1px solid #cbd5e1; font-weight: 600;">Solicitante</th>
                            <th style="padding: 10px; border: 1px solid #cbd5e1; font-weight: 600;">Descripción Material</th>
                            <th style="padding: 10px; border: 1px solid #cbd5e1; font-weight: 600; text-align: center; width: 70px;">Cant.</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        datosFiltrados.forEach((f, index) => {
            let bgColor = (index % 2 === 0) ? '#ffffff' : '#f8fafc';
            htmlMail += `
                <tr style="background-color: ${bgColor};">
                    <td style="padding: 9px 10px; border: 1px solid #cbd5e1; color: #475569;">${f.docVentas}</td>
                    <td style="padding: 9px 10px; border: 1px solid #cbd5e1; color: #475569;">${f.refCliente}</td>
                    <td style="padding: 9px 10px; border: 1px solid #cbd5e1; color: #475569;">${f.solicitante}</td>
                    <td style="padding: 9px 10px; border: 1px solid #cbd5e1; font-weight: bold; color: #1e293b;">${f.material}</td>
                    <td style="padding: 9px 10px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; color: #2563eb; font-size: 14px;">${f.cantidad}</td>
                </tr>
            `;
        });

        htmlMail += `
                    </tbody>
                </table>
        `;

        // Si el usuario ingresó aclaraciones, se añade un cuadro destacado
        if(particularidades !== "") {
            htmlMail += `
                <div style="background-color: #fff7ed; border-left: 4px solid #f97316; padding: 12px; border-radius: 4px; margin-top: 20px; margin-bottom: 20px;">
                    <strong style="color: #c2410c; display: block; margin-bottom: 5px; font-size: 14px;">⚠️ Particularidades / Observaciones importantes:</strong>
                    <p style="margin: 0; font-size: 13px; color: #431407; white-space: pre-wrap;">${particularidades}</p>
                </div>
            `;
        }

        htmlMail += `
                <p style="font-size: 14px; margin-top: 20px;">Quedo a la espera de la confirmación. ¡Muchas gracias!</p>
            </div>
        `;

        // Volcado al elemento oculto para seleccionarlo como HTML enriquecido
        const contenedorOculto = document.getElementById('htmlMailTemplate');
        contenedorOculto.innerHTML = htmlMail;

        // API de portapapeles moderna para copiar texto con formato HTML
        const blob = new Blob([htmlMail], { type: 'text/html' });
        const clipboardItem = new ClipboardItem({ 'text/html': blob });
        
        navigator.clipboard.write([clipboardItem]).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }).catch(err => {
            console.error('Error al copiar: ', err);
            alert('Ocurrió un error al copiar el cuadro. Intentá nuevamente.');
        });
    }
</script>

</body>
</html>
